<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1180" viewBox="0 0 1440 1180">
  <defs>
    <linearGradient id="traceBg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071f2a"/><stop offset="1" stop-color="#123d46"/></linearGradient>
    <marker id="traceArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#efba56"/></marker>
    <filter id="traceShadow"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-opacity=".22"/></filter>
    <style>.title{font:700 40px sans-serif;fill:#fff8e9}.sub{font:400 19px sans-serif;fill:#b9d6d8}.stage{font:700 21px sans-serif;fill:#12333b}.body{font:400 17px sans-serif;fill:#294a50}.dim{font:700 17px monospace;fill:#a64f31}.arrow{stroke:#efba56;stroke-width:4;fill:none;marker-end:url(#traceArrow)}</style>
  </defs>
  <rect width="1440" height="1180" fill="url(#traceBg)"/>
  <text x="70" y="70" class="title">单条 Agent RL 样例：从 JSONL 到参数更新</text>
  <text x="70" y="108" class="sub">实测 tokenizer 长度 + 当前 MiniMind 代码路径；黄色箭头表示数据依赖</text>
  <line x1="720" y1="155" x2="720" y2="1080" stroke="#4c7680" stroke-width="3" stroke-dasharray="8 10"/>
  <g filter="url(#traceShadow)">
    <rect x="90" y="155" width="510" height="125" rx="20" fill="#f4ead2"/>
    <rect x="840" y="155" width="510" height="125" rx="20" fill="#d8ece8"/>
    <rect x="90" y="330" width="510" height="125" rx="20" fill="#d9e4f3"/>
    <rect x="840" y="330" width="510" height="125" rx="20" fill="#f3d9ce"/>
    <rect x="90" y="505" width="510" height="125" rx="20" fill="#d8ece8"/>
    <rect x="840" y="505" width="510" height="125" rx="20" fill="#f4ead2"/>
    <rect x="90" y="680" width="510" height="125" rx="20" fill="#f3d9ce"/>
    <rect x="840" y="680" width="510" height="125" rx="20" fill="#d9e4f3"/>
    <rect x="220" y="875" width="1000" height="165" rx="24" fill="#fff"/>
  </g>
  <text x="125" y="194" class="stage">1 · AgentRLDataset</text><text x="125" y="226" class="body">messages = conversations[:-1]</text><text x="125" y="254" class="dim">tools: 1 schema · gt: [14302730]</text>
  <text x="875" y="194" class="stage">2 · Chat template + tokenizer</text><text x="875" y="226" class="body">schema 与 user 一起进入 prompt</text><text x="875" y="254" class="dim">prompt_ids [277]</text>
  <text x="125" y="369" class="stage">3 · Policy rollout · Turn 1</text><text x="125" y="401" class="body">生成 calculate_math 的 XML + JSON</text><text x="125" y="429" class="dim">tool call [35] · mask=1 · old_logp [35]</text>
  <text x="875" y="369" class="stage">4 · Python 环境</text><text x="875" y="401" class="body">parse → validate → execute → JSON</text><text x="875" y="429" class="dim">result = {14302730}</text>
  <text x="125" y="544" class="stage">5 · Observation 回填</text><text x="125" y="576" class="body">重新渲染，截取新增上下文</text><text x="125" y="604" class="dim">obs_delta [35] · mask=0 · old_logp=0</text>
  <text x="875" y="544" class="stage">6 · Policy rollout · Turn 2</text><text x="875" y="576" class="body">读取结果，生成最终回答</text><text x="875" y="604" class="dim">final [14] · mask=1 · old_logp [14]</text>
  <text x="125" y="719" class="stage">7 · Pack 四条轨迹</text><text x="125" y="751" class="body">长度 [361,350,351,408]，动态 padding</text><text x="125" y="779" class="dim">input_ids [4,408] · action mask [4,407]</text>
  <text x="875" y="719" class="stage">8 · Policy + Reference forward</text><text x="875" y="751" class="body">shift、log_softmax、gather 实际 token</text><text x="875" y="779" class="dim">logits [4,408,6400] · logp [4,407]</text>
  <text x="275" y="918" class="stage">9 · Reward → Advantage → CISPO → Scalar Loss → Backward</text>
  <text x="275" y="956" class="body">rewards [3.0, 0.5, -1.0, 2.0]　→　advantages [1.2371, -0.4124, -1.4020, 0.5773]</text>
  <text x="275" y="990" class="body">逐 token ratio + KL + advantage，只保留 action mask；先轨迹平均，再 batch 平均</text>
  <text x="275" y="1019" class="dim">policy_loss scalar [] → loss.backward() → AdamW 更新 θ；ref_model 不更新</text>
  <path class="arrow" d="M600 217H830"/><path class="arrow" d="M1095 280V315H610V392H600"/><path class="arrow" d="M600 392H830"/><path class="arrow" d="M1095 455V490H610V567H600"/><path class="arrow" d="M600 567H830"/><path class="arrow" d="M1095 630V665H610V742H600"/><path class="arrow" d="M600 742H830"/><path class="arrow" d="M1095 805V850H720V865"/>
  <rect x="175" y="1090" width="1090" height="56" rx="14" fill="#0a2731" stroke="#4b7b81"/>
  <text x="720" y="1126" text-anchor="middle" class="sub">完整轨迹 361 tokens；直接承担策略损失 49 tokens；环境观察不算 loss，但改变下一轮状态</text>
</svg>
