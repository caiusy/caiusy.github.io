<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8f2e7"/><stop offset="1" stop-color="#e9f3ef"/></linearGradient><filter id="sh"><feDropShadow dx="0" dy="6" stdDeviation="7" flood-opacity=".13"/></filter><marker id="ar" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3 0 6Z" fill="#365853"/></marker><style>.h{font:700 34px 'PingFang SC',sans-serif;fill:#173d37}.st{font:16px 'PingFang SC',sans-serif;fill:#58706c}.bh{font:700 20px 'PingFang SC',sans-serif;fill:#fff}.t{font:16px 'PingFang SC',sans-serif;fill:#29413d}.s{font:14px 'PingFang SC',sans-serif;fill:#58706c}.arr{stroke:#365853;stroke-width:3;fill:none;marker-end:url(#ar)}.dash{stroke:#83684e;stroke-width:2.5;stroke-dasharray:7 6;fill:none;marker-end:url(#ar)}</style></defs>
  <rect width="1600" height="1080" fill="url(#bg)"/><text x="65" y="60" class="h">Agent RL：一条工具样本的多轮训练数据流</text><text x="65" y="94" class="st">绿色表示模型动作（参与 loss），米色表示环境 observation（进入上下文但 mask=0）。</text>
  <g filter="url(#sh)">
    <g transform="translate(65 140)"><rect width="260" height="155" rx="20" fill="#fff"/><rect width="260" height="50" rx="20" fill="#516f68"/><rect y="30" width="260" height="20" fill="#516f68"/><text x="20" y="33" class="bh">1. JSONL / Dataset</text><text x="20" y="83" class="t">messages + tools + gt</text><text x="20" y="115" class="s">gt = [14302730]</text><text x="20" y="139" class="s">仍是 Python 对象</text></g>
    <g transform="translate(370 140)"><rect width="260" height="155" rx="20" fill="#fff"/><rect width="260" height="50" rx="20" fill="#806345"/><rect y="30" width="260" height="20" fill="#806345"/><text x="20" y="33" class="bh">2. Chat Template</text><text x="20" y="83" class="t">system + schema + user</text><text x="20" y="115" class="s">prompt_ids [1,P]</text><text x="20" y="139" class="s">P ≤ 768</text></g>
    <g transform="translate(675 140)"><rect width="260" height="155" rx="20" fill="#fff"/><rect width="260" height="50" rx="20" fill="#347e68"/><rect y="30" width="260" height="20" fill="#347e68"/><text x="20" y="33" class="bh">3. Turn 1 动作</text><text x="20" y="83" class="t">生成 &lt;tool_call&gt;</text><text x="20" y="115" class="s">response mask = 1</text><text x="20" y="139" class="s">保存 old token logps</text></g>
    <g transform="translate(980 140)"><rect width="260" height="155" rx="20" fill="#fff"/><rect width="260" height="50" rx="20" fill="#b18255"/><rect y="30" width="260" height="20" fill="#b18255"/><text x="20" y="33" class="bh">4. 环境执行</text><text x="20" y="83" class="t">calculate_math</text><text x="20" y="115" class="s">result = 14302730</text><text x="20" y="139" class="s">observation mask = 0</text></g>
    <g transform="translate(1285 140)"><rect width="250" height="155" rx="20" fill="#fff"/><rect width="250" height="50" rx="20" fill="#347e68"/><rect y="30" width="250" height="20" fill="#347e68"/><text x="20" y="33" class="bh">5. Turn 2 动作</text><text x="20" y="83" class="t">生成最终回答</text><text x="20" y="115" class="s">response mask = 1</text><text x="20" y="139" class="s">最多循环 3 轮</text></g>
  </g>
  <path d="M325 218H365M630 218H670M935 218H975M1240 218H1280" class="arr"/>
  <rect x="90" y="365" width="1420" height="155" rx="28" fill="#173f39"/>
  <text x="125" y="408" class="bh" style="font-size:24px">同一 prompt 独立 rollout 四次（B=1, G=4）</text>
  <g><rect x="130" y="442" width="280" height="48" rx="12" fill="#bfe2d7"/><rect x="470" y="442" width="280" height="48" rx="12" fill="#bfe2d7"/><rect x="810" y="442" width="280" height="48" rx="12" fill="#bfe2d7"/><rect x="1150" y="442" width="280" height="48" rx="12" fill="#bfe2d7"/></g>
  <text x="270" y="473" text-anchor="middle" class="t">轨迹 0: reward 3.0</text><text x="610" y="473" text-anchor="middle" class="t">轨迹 1: reward 1.2</text><text x="950" y="473" text-anchor="middle" class="t">轨迹 2: reward -1.0</text><text x="1290" y="473" text-anchor="middle" class="t">轨迹 3: reward -0.3</text>
  <path d="M800 520V565" class="arr"/>
  <g filter="url(#sh)"><rect x="90" y="580" width="400" height="180" rx="22" fill="#fff"/><rect x="600" y="580" width="400" height="180" rx="22" fill="#fff"/><rect x="1110" y="580" width="400" height="180" rx="22" fill="#fff"/></g>
  <text x="120" y="622" class="t" style="font-weight:700">6. 动态打包</text><text x="120" y="660" class="s">input_ids [4,T], T ≤ 1600</text><text x="120" y="691" class="s">action mask: prompt/obs/pad = 0</text><text x="120" y="722" class="s">tool_call/final answer = 1</text>
  <text x="630" y="622" class="t" style="font-weight:700">7. 两个模型前向</text><text x="630" y="660" class="s">Policy logps [4,T-1]</text><text x="630" y="691" class="s">Reference logps [4,T-1]</text><text x="630" y="722" class="s">logits [4,T,6400]</text>
  <text x="1140" y="622" class="t" style="font-weight:700">8. 组内 Advantage</text><text x="1140" y="660" class="s">A = (R-μ)/(σ+ε)</text><text x="1140" y="691" class="s">[+1.482,+0.309,-1.124,-0.668]</text><text x="1140" y="722" class="s">shape [4] → broadcast [4,T-1]</text>
  <path d="M490 670H595M1000 670H1105" class="arr"/>
  <path d="M800 760V805" class="arr"/>
  <rect x="250" y="820" width="1100" height="170" rx="28" fill="#fff" stroke="#aabfba" stroke-width="2"/>
  <text x="290" y="865" class="t" style="font-weight:700;font-size:21px">9. CISPO token loss → mask 平均 → scalar → backward</text>
  <text x="290" y="910" class="t">ℓᵢₜ = -( clamp(ratio) · Aᵢ · log πθ(aᵢₜ|sᵢₜ) - β · KLᵢₜ )</text>
  <text x="290" y="950" class="s">只平均 action mask=1 的 token；Policy 获得梯度，Reference、Reward Model 与工具环境均不反传。</text>
  <rect x="525" y="1020" width="550" height="40" rx="20" fill="#173f39"/><text x="800" y="1046" text-anchor="middle" class="bh" style="font-size:16px">一次日志 step = 四条多轮轨迹，不是一次普通前向</text>
</svg>
