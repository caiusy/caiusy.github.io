<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071c26"/><stop offset="1" stop-color="#103847"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-opacity=".24"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#f4bd50"/></marker>
    <style>.title{font:700 42px sans-serif;fill:#f8f3e7}.sub{font:400 20px sans-serif;fill:#b6d2d7}.h{font:700 25px sans-serif;fill:#08202a}.p{font:400 18px sans-serif;fill:#19333b}.n{font:700 27px sans-serif;fill:#f4bd50}.arrow{stroke:#f4bd50;stroke-width:4;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>
  <circle cx="1310" cy="80" r="170" fill="#eb8f57" opacity=".08"/><circle cx="70" cy="830" r="220" fill="#51b7ae" opacity=".08"/>
  <text x="90" y="90" class="title">Agent RL：从会调用，到会选择、会修正</text>
  <text x="90" y="130" class="sub">四层理解路线：直觉 → 外部循环 → 张量 → 策略梯度</text>
  <g filter="url(#shadow)">
    <rect x="90" y="205" rx="24" width="280" height="480" fill="#f7e7bc"/>
    <rect x="415" y="205" rx="24" width="280" height="480" fill="#cee9e4"/>
    <rect x="740" y="205" rx="24" width="280" height="480" fill="#d9e3f3"/>
    <rect x="1065" y="205" rx="24" width="280" height="480" fill="#f3d6cb"/>
  </g>
  <text x="125" y="255" class="n">01</text><text x="125" y="300" class="h">小学生：工具箱</text>
  <text x="125" y="350" class="p">模型写调用纸条</text><text x="125" y="385" class="p">Python 真正执行</text><text x="125" y="420" class="p">结果交回模型</text><text x="125" y="455" class="p">整次答题得分</text>
  <text x="450" y="255" class="n">02</text><text x="450" y="300" class="h">初中生：闭环</text>
  <text x="450" y="350" class="p">router 筛候选</text><text x="450" y="385" class="p">LLM 选行动</text><text x="450" y="420" class="p">executor 给观察</text><text x="450" y="455" class="p">最多三轮结束</text>
  <text x="775" y="255" class="n">03</text><text x="775" y="300" class="h">高中生：张量</text>
  <text x="775" y="350" class="p">input [B×G,T]</text><text x="775" y="385" class="p">hidden [B×G,T,H]</text><text x="775" y="420" class="p">logits [B×G,T,V]</text><text x="775" y="455" class="p">action mask 选位置</text>
  <text x="1100" y="255" class="n">04</text><text x="1100" y="300" class="h">工程师：优化</text>
  <text x="1100" y="350" class="p">4 条 rollout 比较</text><text x="1100" y="385" class="p">reward → advantage</text><text x="1100" y="420" class="p">ratio + KL + CISPO</text><text x="1100" y="455" class="p">backward 更新参数</text>
  <path class="arrow" d="M370 445 H405"/><path class="arrow" d="M695 445 H730"/><path class="arrow" d="M1020 445 H1055"/>
  <rect x="230" y="745" rx="18" width="980" height="78" fill="#09242f" stroke="#51b7ae" stroke-width="2"/>
  <text x="720" y="795" text-anchor="middle" class="sub">不变的核心：模型只生成 token；外部环境执行工具；reward 改变未来 token 概率</text>
</svg>
