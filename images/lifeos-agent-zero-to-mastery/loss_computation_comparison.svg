<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920">
  <defs><linearGradient id="b3" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fff8ed"/><stop offset="1" stop-color="#edf5f2"/></linearGradient><marker id="a3" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3 0 6Z" fill="#45625e"/></marker><style>.h{font:700 32px 'PingFang SC',sans-serif;fill:#173c37}.label{font:700 20px 'PingFang SC',sans-serif;fill:#fff}.t{font:16px 'PingFang SC',sans-serif;fill:#29413e}.f{font:17px Georgia,serif;fill:#173c37}.arr{stroke:#45625e;stroke-width:2.5;fill:none;marker-end:url(#a3)}</style></defs>
  <rect width="1500" height="920" fill="url(#b3)"/><text x="65" y="60" class="h">从 logits 到 scalar loss：五条不同路径</text>
  <g transform="translate(60 115)"><rect width="1380" height="125" rx="20" fill="#fff" stroke="#d4c5af"/><rect width="145" height="125" rx="20" fill="#d97941"/><text x="72" y="70" text-anchor="middle" class="label">SFT</text><text x="180" y="43" class="t">logits [B,T,V] + labels [B,T]</text><path d="M455 62H540" class="arr"/><text x="565" y="43" class="t">gather 正确 token + assistant mask</text><path d="M875 62H960" class="arr"/><text x="990" y="43" class="f">L = -mean log p(yₜ)</text><text x="180" y="91" class="t">标准答案逐 token 监督；没有 reference、reward 或 advantage。</text></g>
  <g transform="translate(60 260)"><rect width="1380" height="125" rx="20" fill="#fff" stroke="#d4c5af"/><rect width="145" height="125" rx="20" fill="#ba5b67"/><text x="72" y="70" text-anchor="middle" class="label">DPO</text><text x="180" y="43" class="t">policy/ref × chosen/rejected [2B,T,V]</text><path d="M555 62H630" class="arr"/><text x="655" y="43" class="t">mask 后序列 logp 差</text><path d="M885 62H960" class="arr"/><text x="990" y="43" class="f">L = -log σ(β(Δπ-Δref))</text><text x="180" y="91" class="t">比较完整回答偏好；reference 冻结，只更新 policy。</text></g>
  <g transform="translate(60 405)"><rect width="1380" height="125" rx="20" fill="#fff" stroke="#d4c5af"/><rect width="145" height="125" rx="20" fill="#4b778d"/><text x="72" y="70" text-anchor="middle" class="label">PPO</text><text x="180" y="43" class="t">new/old/ref logp [B,R] + values [B,R]</text><path d="M535 62H610" class="arr"/><text x="635" y="43" class="t">GAE advantage + return</text><path d="M875 62H950" class="arr"/><text x="975" y="43" class="f">L = Lclip + cv·LV + ckl·KL</text><text x="180" y="91" class="t">actor 和 critic 都训练；response 最后一个 token 接收外部 reward。</text></g>
  <g transform="translate(60 550)"><rect width="1380" height="125" rx="20" fill="#fff" stroke="#d4c5af"/><rect width="145" height="125" rx="20" fill="#43846f"/><text x="72" y="70" text-anchor="middle" class="label">GRPO</text><text x="180" y="43" class="t">rewards [B×G] → grouped [B,G]</text><path d="M500 62H575" class="arr"/><text x="600" y="43" class="t">A=(R-μgroup)/σgroup</text><path d="M870 62H945" class="arr"/><text x="970" y="43" class="f">L = token policy loss + βKL</text><text x="180" y="91" class="t">没有 critic；同一 prompt 内相对比较，A 为标量并广播到 response tokens。</text></g>
  <g transform="translate(60 695)"><rect width="1380" height="150" rx="20" fill="#fff" stroke="#d4c5af"/><rect width="145" height="150" rx="20" fill="#665889"/><text x="72" y="82" text-anchor="middle" class="label">Agent RL</text><text x="180" y="43" class="t">多轮轨迹 [B×G,T] + tool/gt reward</text><path d="M510 62H585" class="arr"/><text x="610" y="43" class="t">组内 A + action mask</text><path d="M845 62H920" class="arr"/><text x="945" y="43" class="f">L = CISPO(action tokens) + βKL</text><text x="180" y="91" class="t">tool_call 与最终回答 mask=1；环境 observation mask=0；最终结果正确性奖励整条轨迹。</text><text x="180" y="122" class="t">最长 1600 token，最多 3 轮，因此计算最重。</text></g>
  <rect x="390" y="870" width="720" height="35" rx="17" fill="#173c37"/><text x="750" y="894" text-anchor="middle" class="label" style="font-size:16px">所有路径最终都压缩成一个 scalar，才能 backward 更新参数</text>
</svg>
