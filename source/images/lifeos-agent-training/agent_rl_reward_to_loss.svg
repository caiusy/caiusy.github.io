<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs><linearGradient id="b4" x1="0" x2="1"><stop stop-color="#f8f2e5"/><stop offset="1" stop-color="#edf4f2"/></linearGradient><marker id="a4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#234e59"/></marker><style>.t{font:700 40px sans-serif;fill:#173b43}.s{font:400 18px sans-serif;fill:#526a70}.h{font:700 22px sans-serif;fill:#173b43}.p{font:400 18px sans-serif;fill:#274a52}.v{font:700 24px monospace;fill:#fff}.ar{stroke:#234e59;stroke-width:4;fill:none;marker-end:url(#a4)}</style></defs>
  <rect width="1440" height="900" fill="url(#b4)"/><text x="75" y="78" class="t">同一道题的 4 条 Rollout：Reward 怎样变成 Token Loss</text><text x="75" y="115" class="s">数字为可复算教学示例；组内比较消除题目难度尺度，mask 决定哪些 token 承担责任</text>
  <g><rect x="90" y="190" width="250" height="140" rx="18" fill="#287c6f"/><rect x="410" y="190" width="250" height="140" rx="18" fill="#4d8b7f"/><rect x="730" y="190" width="250" height="140" rx="18" fill="#bd6848"/><rect x="1050" y="190" width="250" height="140" rx="18" fill="#a85845"/></g>
  <text x="215" y="230" text-anchor="middle" class="v">τ1 · R=3.0</text><text x="215" y="270" text-anchor="middle" class="v">A=+1.482</text><text x="215" y="305" text-anchor="middle" style="font:16px sans-serif;fill:#fff">全正确：提高概率</text>
  <text x="535" y="230" text-anchor="middle" class="v">τ2 · R=1.2</text><text x="535" y="270" text-anchor="middle" class="v">A=+0.309</text><text x="535" y="305" text-anchor="middle" style="font:16px sans-serif;fill:#fff">略好：小幅提高</text>
  <text x="855" y="230" text-anchor="middle" class="v">τ3 · R=-1.0</text><text x="855" y="270" text-anchor="middle" class="v">A=-1.124</text><text x="855" y="305" text-anchor="middle" style="font:16px sans-serif;fill:#fff">最差：降低概率</text>
  <text x="1175" y="230" text-anchor="middle" class="v">τ4 · R=-0.3</text><text x="1175" y="270" text-anchor="middle" class="v">A=-0.668</text><text x="1175" y="305" text-anchor="middle" style="font:16px sans-serif;fill:#fff">低于均值：降低</text>
  <path class="ar" d="M215 345V430H620"/><path class="ar" d="M535 345V400H640"/><path class="ar" d="M855 345V400H800"/><path class="ar" d="M1175 345V430H820"/>
  <rect x="505" y="445" width="430" height="110" rx="22" fill="#fff" stroke="#94b7b6" stroke-width="2"/><text x="720" y="486" text-anchor="middle" class="h">组内标准化</text><text x="720" y="525" text-anchor="middle" class="p">Aᵢ = (Rᵢ − μ) / (σ + 10⁻⁴)</text>
  <path class="ar" d="M720 555V625"/>
  <rect x="285" y="640" width="870" height="150" rx="24" fill="#173b43"/>
  <text x="720" y="685" text-anchor="middle" style="font:700 22px sans-serif;fill:#f7e7bc">CISPO 逐 token：ratio 权重 × advantage × log probability − βKL</text>
  <text x="720" y="728" text-anchor="middle" style="font:400 19px sans-serif;fill:#d4e7e7">只保留 mask=1 的 tool-call 与 final-answer token</text>
  <text x="720" y="763" text-anchor="middle" style="font:400 19px sans-serif;fill:#d4e7e7">先每条轨迹平均 → 再 batch 平均 → scalar loss → backward</text>
