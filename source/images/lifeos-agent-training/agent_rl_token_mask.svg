  <text x="530" y="209" text-anchor="middle" class="w">Prompt / Schema · 277</text><text x="943" y="209" text-anchor="middle" class="w">Tool Call · 35</text><text x="1132" y="209" text-anchor="middle" class="w">Obs · 35</text><text x="1251" y="209" text-anchor="middle" class="w">Final · 14</text>
  <text x="85" y="315" class="n">Action mask</text>
  <rect x="250" y="278" width="560" height="72" rx="12" fill="#263e48" stroke="#607d8b"/><rect x="810" y="278" width="266" height="72" rx="12" fill="#c74f2b"/><rect x="1076" y="278" width="112" height="72" rx="12" fill="#263e48" stroke="#62a69a"/><rect x="1188" y="278" width="126" height="72" rx="12" fill="#c78b18"/>
