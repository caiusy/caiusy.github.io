  <text x="85" y="430" class="n">作用</text>
  <text x="530" y="420" text-anchor="middle" class="s">给状态，不承担策略损失</text><text x="943" y="420" text-anchor="middle" class="s">模型行动，计算 loss</text><text x="1132" y="420" text-anchor="middle" class="s">环境观察，不算 loss</text><text x="1251" y="420" text-anchor="middle" class="s">模型行动</text>
