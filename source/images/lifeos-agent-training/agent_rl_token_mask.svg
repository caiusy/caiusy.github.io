<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760">
  <defs><linearGradient id="b3"><stop stop-color="#0b2530"/><stop offset="1" stop-color="#163e47"/></linearGradient><style>.t{font:700 40px sans-serif;fill:#fff8e8}.s{font:400 19px sans-serif;fill:#b9d4d6}.h{font:700 21px sans-serif;fill:#102e35}.w{font:700 19px monospace;fill:#fff}.n{font:400 18px sans-serif;fill:#d5e8e8}</style></defs>
  <rect width="1440" height="760" fill="url(#b3)"/><text x="80" y="80" class="t">一条多轮轨迹：哪些 token 学习，哪些只提供上下文</text><text x="80" y="118" class="s">当前 MiniMind tokenizer 实测：P=277，R1=35，O=35，R2=14</text>
