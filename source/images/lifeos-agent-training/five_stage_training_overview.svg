<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f7f1e3"/><stop offset="1" stop-color="#e8f1ed"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="7" stdDeviation="8" flood-opacity=".13"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#314b48"/></marker>
    <style>
      .title{font:700 34px 'PingFang SC','Noto Sans CJK SC',sans-serif;fill:#173b36}.sub{font:16px 'PingFang SC',sans-serif;fill:#55706c}
      .h{font:700 24px 'PingFang SC',sans-serif;fill:#fff}.t{font:17px 'PingFang SC',sans-serif;fill:#273c39}.small{font:15px 'PingFang SC',sans-serif;fill:#536865}
      .line{stroke:#314b48;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1500" height="900" fill="url(#bg)"/>
  <text x="70" y="65" class="title">同一个 Transformer，五种不同的学习信号</text>
  <text x="70" y="98" class="sub">区别集中在答案来源、奖励构造、mask 与 loss；主干网络始终输出 token logits。</text>
  <g filter="url(#shadow)">
    <g transform="translate(60 145)"><rect width="260" height="570" rx="24" fill="#fff"/><rect width="260" height="70" rx="24" fill="#d97941"/><rect y="46" width="260" height="24" fill="#d97941"/><text x="24" y="44" class="h">SFT</text><text x="24" y="110" class="t">数据：问题 + 标准答案</text><text x="24" y="155" class="small">teacher forcing</text><text x="24" y="187" class="small">assistant token mask</text><text x="24" y="240" class="t">网络输出</text><text x="24" y="274" class="small">logits [B,T,V]</text><text x="24" y="327" class="t">学习信号</text><text x="24" y="361" class="small">正确 token ID</text><text x="24" y="414" class="t">Loss</text><text x="24" y="448" class="small">Cross Entropy</text><text x="24" y="500" class="small">像照着标准答案临摹</text></g>
    <g transform="translate(340 145)"><rect width="260" height="570" rx="24" fill="#fff"/><rect width="260" height="70" rx="24" fill="#ba5b67"/><rect y="46" width="260" height="24" fill="#ba5b67"/><text x="24" y="44" class="h">DPO</text><text x="24" y="110" class="t">数据：chosen / rejected</text><text x="24" y="155" class="small">policy + frozen reference</text><text x="24" y="187" class="small">两条序列同时前向</text><text x="24" y="240" class="t">网络输出</text><text x="24" y="274" class="small">2B 条序列 log probability</text><text x="24" y="327" class="t">学习信号</text><text x="24" y="361" class="small">相对偏好差</text><text x="24" y="414" class="t">Loss</text><text x="24" y="448" class="small">-log sigmoid(βΔ)</text><text x="24" y="500" class="small">学会两篇答案谁更好</text></g>
    <g transform="translate(620 145)"><rect width="260" height="570" rx="24" fill="#fff"/><rect width="260" height="70" rx="24" fill="#4b778d"/><rect y="46" width="260" height="24" fill="#4b778d"/><text x="24" y="44" class="h">PPO</text><text x="24" y="110" class="t">数据：prompt</text><text x="24" y="155" class="small">actor 在线生成</text><text x="24" y="187" class="small">critic + reference + RM</text><text x="24" y="240" class="t">网络输出</text><text x="24" y="274" class="small">logps [B,R], values [B,R]</text><text x="24" y="327" class="t">学习信号</text><text x="24" y="361" class="small">GAE token advantage</text><text x="24" y="414" class="t">Loss</text><text x="24" y="448" class="small">clipped actor + value</text><text x="24" y="500" class="small">写一篇，评分并学习估分</text></g>
    <g transform="translate(900 145)"><rect width="260" height="570" rx="24" fill="#fff"/><rect width="260" height="70" rx="24" fill="#43846f"/><rect y="46" width="260" height="24" fill="#43846f"/><text x="24" y="44" class="h">GRPO</text><text x="24" y="110" class="t">数据：prompt</text><text x="24" y="155" class="small">每题生成 G 条答案</text><text x="24" y="187" class="small">无 Critic</text><text x="24" y="240" class="t">网络输出</text><text x="24" y="274" class="small">logps [B×G,R]</text><text x="24" y="327" class="t">学习信号</text><text x="24" y="361" class="small">组内标准化 advantage</text><text x="24" y="414" class="t">Loss</text><text x="24" y="448" class="small">GRPO / CISPO + KL</text><text x="24" y="500" class="small">同题写四篇，组内排名</text></g>
    <g transform="translate(1180 145)"><rect width="260" height="570" rx="24" fill="#fff"/><rect width="260" height="70" rx="24" fill="#665889"/><rect y="46" width="260" height="24" fill="#665889"/><text x="24" y="44" class="h">Agent RL</text><text x="24" y="110" class="t">数据：prompt + tools + gt</text><text x="24" y="155" class="small">G 条多轮工具轨迹</text><text x="24" y="187" class="small">tool observation mask=0</text><text x="24" y="240" class="t">网络输出</text><text x="24" y="274" class="small">logps [B×G,T-1]</text><text x="24" y="327" class="t">学习信号</text><text x="24" y="361" class="small">格式 + 工具 + 结果 reward</text><text x="24" y="414" class="t">Loss</text><text x="24" y="448" class="small">trajectory CISPO + KL</text><text x="24" y="500" class="small">完成一场开卷实操考试</text></g>
  </g>
  <path d="M190 745 L1310 745" class="line"/><text x="520" y="790" class="t">监督更直接、成本较低</text><text x="955" y="790" class="t">反馈更接近真实行为、计算更昂贵</text>
  <rect x="415" y="825" width="670" height="46" rx="23" fill="#173b36"/><text x="750" y="855" text-anchor="middle" class="h" style="font-size:18px">共同终点：scalar loss → backward → 更新 policy 参数</text>
</svg>
